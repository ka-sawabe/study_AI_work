<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけんゲーム</title>
    <!-- CSSの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>じゃんけんゲーム</h1>
    
    <!-- ボタンエリア -->
    <div>
        <button id="btn-rock">グー</button>
        <button id="btn-scissors">チョキ</button>
        <button id="btn-paper">パー</button>
    </div>

    <!-- 結果表示エリア -->
    <div id="result-area">
        <p>あなたの手: <span id="result-user">-</span></p>
        <p>コンピュータの手: <span id="result-computer">-</span></p>
        <p>結果: <span id="result-text">-</span></p>
        <p>残り回数: <span id="remaining-count">5</span></p>
        <p>スコア: 勝ち <span id="score-win">0</span> / 負け <span id="score-lose">0</span> / あいこ <span id="score-draw">0</span></p>
    </div>

    <!-- JavaScriptの読み込み -->
    <script src="script.js"></script>
</body>
</html>
