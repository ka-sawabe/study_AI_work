<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キッチンタイマー</title>
    <!-- スタイルシートの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="timer-container">
        <h1>キッチンタイマー</h1>
        <!-- タイマー表示エリア -->
        <div id="display" class="timer-display">00:00</div>
        
        <!-- 入力エリア -->
        <div class="input-area">
            <input type="number" id="minutes" placeholder="分" min="0" max="99">
            <input type="number" id="seconds" placeholder="秒" min="0" max="59">
        </div>
        
        <!-- 操作ボタン -->
        <div class="button-area">
            <button id="startBtn">スタート</button>
            <button id="stopBtn">ストップ</button>
            <button id="resetBtn">リセット</button>
        </div>
    </div>
    <!-- JavaScriptの読み込み -->
    <script src="script.js"></script>
</body>
</html>
